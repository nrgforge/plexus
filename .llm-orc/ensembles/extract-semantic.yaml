      - type: one of the allowed types

      Guidelines:
      - Extract 5-20 concepts depending on content length
      - Include both named entities and important abstract concepts
      - Normalize labels (lowercase, consistent naming)
    output_format: json
    ollama_format:
      type: object
      properties:
        concepts:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              type:
                type: string
                enum:
                  - concept
                  - component
                  - person
                  - organization
                  - location
                  - event
                  - process
                  - pattern
