  # --- Theme extraction (single run, low temp) ---

  - name: theme
    model_profile: analyst-mistral
    timeout_seconds: 120
    temperature: 0.15
    system_prompt: |
      Identify the major themes in the provided text.

      For each theme, provide:
      - description: concise theme description (2-5 words)
      - type: one of the allowed types
      - supporting_evidence: brief quote or paraphrase

      Return a JSON object with a "themes" array.
    output_format: json
    ollama_format:
      type: object
      properties:
        themes:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
              type:
                type: string
                enum:
                  - argument
                  - methodology
                  - finding
                  - concept
                  - tension
                  - pattern
              supporting_evidence:
                type: string
            required:
              - description
              - type
              - supporting_evidence
      required:
        - themes
