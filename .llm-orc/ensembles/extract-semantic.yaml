  # --- Entity extraction: unprimed (discovery, low temp) ---

  - name: entity-unprimed
    model_profile: analyst-mistral
    timeout_seconds: 120
    temperature: 0.15
    system_prompt: |
      Extract all concepts, entities, and important terms from the provided text.

      For each concept, provide a JSON object with "label" (lowercase, 1-3 words)
      and "type" (concept, component, person, organization, location, event,
      process, pattern, or principle).

      Return a JSON object with a "concepts" array.
    output_format: json

  # --- Relationship extraction (3 runs at temp 0.3) ---

  - name: relationship-1
    model_profile: analyst-mistral
    timeout_seconds: 120
    temperature: 0.3
    system_prompt: |
      Extract relationships between concepts in the provided text.

      For each relationship, provide:
      - source: entity label (lowercase)
      - target: entity label (lowercase)
      - relationship: one of the allowed types
      - evidence: brief quote or paraphrase from the text

      Guidelines:
      - Only include relationships with clear textual evidence
      - Extract ALL relationships visible in the text
      - Use normalized entity labels (lowercase, 1-3 words)
    output_format: json
    ollama_format:
      type: object
      properties:
        relationships:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              relationship:
                type: string
                enum:
                  - caused_by
                  - remedies
                  - exemplifies
                  - describes
                  - mechanism_of
                  - distinct_from
                  - eroded_by
                  - accelerates
                  - instance_of
                  - component_of
                  - enables
                  - constrains
                  - produces
                  - requires
                  - implements
                  - uses
                  - depends_on
                  - part_of
                  - related_to
              evidence:
                type: string
            required:
              - source
              - target
              - relationship
              - evidence
      required:
        - relationships

