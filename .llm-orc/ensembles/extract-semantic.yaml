# Production extraction ensemble (Essay 25 architecture)
#
# 1 SpaCy script agent + 8 LLM agents. Each agent operates independently —
# no DAG dependencies. Multi-run union exploits run-to-run variation,
# denoised by Invariant 45 (contribution-based reinforcement).
#
# Entity-primed agents receive dynamic vocabulary from SemanticAdapter.build_input()
# (existing concepts from Phase 1 frontmatter + Phase 2 CamelCase/proper nouns).
# The vocabulary is NOT hardcoded here — it arrives via input_data at runtime.

name: extract-semantic
description: >
  Multi-agent semantic extraction pipeline. SpaCy (NER + dependency parsing)
  runs alongside LLM agents for entity, relationship, and theme extraction.
  Independent accumulation — Invariant 45 handles reinforcement across agents.

max_concurrency: 1

agents:
  # --- Phase 2 complement: SpaCy NER + dependency parsing + co-occurrence ---

  - name: spacy-extract
    script: scripts/extraction/spacy-extract.py

  # --- Entity extraction: primed (3 runs at temp 0.3 for variation) ---

  - name: entity-primed-1
    model_profile: analyst-mistral
    timeout_seconds: 120
    temperature: 0.3
    system_prompt: |
      Extract concepts and entities from the provided text.

      KNOWN VOCABULARY (use as hints — look for these AND anything else):
      The input may include an "existing_concepts" field with terms already
      known to the knowledge graph. Prioritize confirming or refining these,
      but also discover new entities not in the list.

      For each concept, provide:
      - label: canonical name (lowercase, 1-3 words)
      - type: one of the allowed types

      Guidelines:
      - Extract 5-20 concepts depending on content length
      - Include both named entities and important abstract concepts
      - Normalize labels (lowercase, consistent naming)
    output_format: json
    ollama_format:
      type: object
      properties:
        concepts:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              type:
                type: string
                enum:
                  - concept
                  - component
                  - person
                  - organization
                  - location
                  - event
                  - process
                  - pattern
                  - principle
            required:
              - label
              - type
      required:
        - concepts

