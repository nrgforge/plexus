# Production extraction ensemble (Essay 25 architecture)
#
# 1 SpaCy script agent + 8 LLM agents. SpaCy runs first as vocabulary
# bootstrap — entity-primed agents depend on its output via DAG. Other
# agents (entity-unprimed, relationship, theme) remain independent.
# Multi-run union exploits run-to-run variation, denoised by Invariant 45
# (contribution-based reinforcement).
#
# Vocabulary sources for entity-primed agents (additive, both always present):
# 1. SpaCy (DAG): NER + noun phrase entities discovered from text structure
# 2. SemanticAdapter (runtime): existing graph concepts via input_data
# Cold start (empty graph): SpaCy is the only vocabulary source.
# Warm start (rich graph): both sources contribute; SpaCy adds marginal value.

name: extract-semantic
description: >
  Multi-agent semantic extraction pipeline. SpaCy (NER + dependency parsing)
  runs first as vocabulary bootstrap. Entity-primed agents depend on SpaCy
  output for domain vocabulary hints. Relationship, theme, and entity-unprimed
  agents remain independent. Invariant 45 handles reinforcement across agents.

max_concurrency: 1

agents:
  # --- Phase 2 complement: SpaCy NER + dependency parsing + co-occurrence ---

  - name: spacy-extract
    script: scripts/extraction/spacy-extract.py

  # --- Entity extraction: primed (3 runs at temp 0.3 for variation) ---

  - name: entity-primed-1
    model_profile: analyst-mistral
    timeout_seconds: 240
    temperature: 0.3
    depends_on: [spacy-extract]
    system_prompt: |
      Extract concepts and entities from the provided text.

      KNOWN VOCABULARY (from upstream NLP analysis):
      The previous agent results contain entities discovered from the text
      via NLP analysis (NER, noun phrases, compound terms). Use these as
      vocabulary hints — look for these terms AND anything else you find.

      The input may also include an "existing_concepts" field with terms
      already known to the knowledge graph. Both vocabulary sources are
      additive — use all of them as hints for what to extract.

      For each concept, provide:
      - label: canonical name (lowercase, 1-3 words)
      - type: one of the allowed types

      Guidelines:
      - Extract 5-20 concepts depending on content length
      - Include both named entities and important abstract concepts
      - Normalize labels (lowercase, consistent naming)
    output_format: json
    ollama_format:
      type: object
      properties:
        concepts:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              type:
                type: string
                enum:
                  - concept
                  - component
                  - person
                  - organization
                  - location
                  - event
                  - process
                  - pattern
                  - principle
            required:
              - label
              - type
      required:
        - concepts

